<!DOCTYPE html>
<html>
<body>

<h2>Room Player Client</h2>

<label>
  Player name:
  <input id="playerName" maxlength="24" placeholder="Your name">
</label>

<br><br>

<label>
  Room code:
  <input id="roomCode" value="ABCD" maxlength="10">
</label>

<button onclick="joinRoom()">Join Room</button>

<p id="status">Not joined</p>

<hr>

<input type="range" min="0" max="4" value="2" step="1" id="slider">
<p id="sliderValue">Neutral</p>

<button onclick="submitSlider()">Send Slider</button>
<button onclick="sendButton()">Send Button</button>

<div id="log"></div>

<script src="client.js"></script>

</body>
</html>
