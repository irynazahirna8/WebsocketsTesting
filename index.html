<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Room</title>
    <link rel="stylesheet" href="Design.css">
</head>
<body>
    <div class="JoinRoom">
        <h2>Room Player Client</h2>

        <div class="join-form">
            <label>
                Player name:
                <input id="playerName" maxlength="24" placeholder="Your name">
            </label>

            <label>
                Room code:
                <input id="roomCode" value="ABCD" maxlength="10">
            </label>

            <button class="join-btn" onclick="joinRoom()">Join Room</button>

            <p id="status">Not joined</p>

            <div id="log"></div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
