
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Screen</title>
    <link rel="stylesheet" href="Design.css">
    
</head>
<body>
    <div class="BasicScreen">

        <div class="circle" id="characterCircle">
            <img src="" alt="profile" class="circle-image" id="profileImage">
        </div>

        

    </div>

        <div class="modal" id="imageModal">
            <div class="modal-content">
                <img src="" alt="full character" alt="profile enlarged" class="full-character-image" id="fullImage">
    
                <div class="modal-right-section">
                    <div class="text-box" style="background-color: #FFFFFF;">Box 1 Text</div>
                    <div class="text-box" style="background-color: #FF6B6B;">Box 2 Text</div>
                    <p class="modal-text">Your text here</p>
                </div>
            </div>
        </div>
    </div>
    <p id="status">Waiting for the next step</p>
    <div id="log"></div>

    <script>
        const profileImage = document.getElementById('profileImage');
        const imageModal = document.getElementById('imageModal');

        profileImage.addEventListener('click', function() {
            imageModal.classList.add('active');
        });

        imageModal.addEventListener('click', function(e) {
            if (e.target === imageModal) {
                imageModal.classList.remove('active');
            }
        });
    </script>
    <script src="WaitingScreen.js"></script>

</body>
</html>
